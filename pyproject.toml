[project]
name = "shrinkr"
version = "0.1.0"
description = "Package for covariance matrix shrinkage estimation."
readme = "README.md"
authors = [
    { name = "ZetrextJG", email = "jakubzgrzywaczewski@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
  "Cython",
  "numpy>=2.0.0rc1",
  "setuptools"
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "build>=1.5.0",
    "setuptools>=82.0.1",
    "wheel>=0.47.0",
]
